- name: Deploy Filebeat for nginx logs
  hosts: web
  become: yes

  tasks:
    - name: Create filebeat directory
      ansible.builtin.file:
        path: /opt/filebeat
        state: directory
        mode: "0755"

    - name: Write filebeat config
      ansible.builtin.copy:
        dest: /opt/filebeat/filebeat.yml
        mode: "0644"
        content: |
          filebeat.inputs:
            - type: filestream
              id: nginx-access
              enabled: true
              paths:
                - /var/log/nginx/access.log
            - type: filestream
              id: nginx-error
              enabled: true
              paths:
                - /var/log/nginx/error.log

          processors:
            - add_host_metadata: {}
            - add_cloud_metadata: {}
            - add_fields:
                target: ""
                fields:
                  service: nginx
                  env: diploma

          output.elasticsearch:
            hosts: ["http://elastic.ru-central1.internal:9200"]
            index: "nginx-%{+yyyy.MM.dd}"

          setup.ilm.enabled: false
          setup.template.name: "nginx"
          setup.template.pattern: "nginx-*"

    - name: Run Filebeat container
      community.docker.docker_container:
        name: filebeat
        image: docker.elastic.co/beats/filebeat:8.12.2
        state: started
        restart_policy: always
        user: root
        command: ["--strict.perms=false"]
        volumes:
          - /opt/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
          - /var/log/nginx:/var/log/nginx:ro
