- name: Deploy Kibana
  hosts: kibana
  become: yes

  tasks:
    - name: Run Kibana container
      community.docker.docker_container:
        name: kibana
        image: docker.elastic.co/kibana/kibana:8.12.2
        state: started
        restart_policy: always
        ports:
          - "5601:5601"
        env:
          ELASTICSEARCH_HOSTS: "http://elastic.ru-central1.internal:9200"
          SERVER_HOST: "0.0.0.0"
